<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Novo Cadastro</title>
</head>
<body>

  <main>
    <h1>Criar Conta</h1>
    <p>Preencha seus dados para se cadastrar.</p>

    <form action="https://httpbin.org/post" method="post">

      <fieldset>
        <legend>Informações pessoais</legend>

        <p>
          <label for="nome">Nome completo</label><br>
          <input type="text" id="nome" name="nome" minlength="3" required>
        </p>

        <p>
          <label for="email">E-mail</label><br>
          <input type="email" id="email" name="email" required>
        </p>

        <p>
          <label for="senha">Senha</label><br>
          <input type="password" id="senha" name="senha" minlength="8" required>
        </p>

        <p>
          <label for="nascimento">Data de nascimento</label><br>
          <input type="date" id="nascimento" name="nascimento" required>
        </p>

      </fieldset>

      <fieldset>
        <legend>Gênero</legend>

        <p>
          <input type="radio" id="masculino" name="genero" value="masculino">
          <label for="masculino">Masculino</label>
        </p>

        <p>
          <input type="radio" id="feminino" name="genero" value="feminino">
          <label for="feminino">Feminino</label>
        </p>

        <p>
          <input type="radio" id="outro" name="genero" value="outro">
          <label for="outro">Outro</label>
        </p>

        <p>
          <input type="radio" id="naoInformar" name="genero" value="prefiro_nao_informar">
          <label for="naoInformar">Prefiro não informar</label>
        </p>

      </fieldset>

      <p>
        <input type="checkbox" id="aceite" name="aceite" value="sim" required>
        <label for="aceite">Aceito os termos de uso</label>
      </p>

      <p>
        <button type="submit">Criar conta</button>
        <button type="reset">Limpar campos</button>
      </p>

    </form>
  </main>

</body>
</html>
