<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWEB1 — Cap. 07 — AT01 — Cartão de Apresentação</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #95c0f0;
            text-align: center;
            padding: 2rem;
        }

        .cartao {
            width: 300px;
            padding: 2rem;
            border-radius: 8px;
            background-color: rgb(255, 255, 235);
            margin: 2rem auto;
        }

        .cartao-nome {
            font-size: 2rem;
            color: #598fcd;
            margin-bottom: 10px;
        }

        .cartao-divisor {
            border: 3px dashed #1f3c88;
        }

        .cartao-cargo {
            font-style: italic;
            color: #333;
        }

        .cartao-email {
            font-size: 1rem;
            color: #007bff;
        }
    </style>
</head>
<body>

    <main>
        <article class="cartao">
            <h1 class="cartao-nome">
                Adonai Roberto de Oliveira Narciso
            </h1>

            <hr class="cartao-divisor" />

            <p class="cartao-cargo">
                Estudante de Sistemas de Informação — IFAL
            </p>

            <p class="cartao-email">
                aron2@aluno.ifal.edu.br
            </p>
        </article>
    </main>

</body>
</html>
